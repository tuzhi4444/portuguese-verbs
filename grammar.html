function LevelBadge({ level, small }) {
  return (
    <span style={{ background: LEVEL_COLOR[level]||"#888", color:"#fff", borderRadius:20, padding: small?"2px 7px":"3px 10px", fontSize: small?9:11, fontWeight:700, letterSpacing:0.5 }}>{level}</span>
  );
}

// Renders one table based on its type
function GrammarTable({ table }) {
  if (table.twoCol) {
    // Two-column comparison table
    return (
      <div style={{ marginBottom:20 }}>
        <div style={{ fontWeight:700, fontSize:13, color:"#333", marginBottom:8 }}>{table.title}</div>
        <div style={{ background:"#fff", borderRadius:12, overflow:"hidden", boxShadow:"0 2px 12px #0000000d" }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr" }}>
            {table.headers.map((h,i) => (
              <div key={i} style={{ background:"#1a1a2e", color:"#f5e6c8", padding:"10px 14px", fontSize:12, fontWeight:700, borderRight:i===0?"1px solid rgba(255,255,255,0.15)":"none" }}>{h}</div>
            ))}
            {table.rows.map((row,ri) => (
              row.map((cell,ci) => (
                <div key={`${ri}-${ci}`} style={{ padding:"9px 14px", fontSize:13, color:"#333", background: ri%2===0?"#faf7f0":"#f3ede3", borderRight:ci===0?"1px solid #e8e0d0":"none", borderTop:"1px solid #ece6da", lineHeight:1.5 }}>{cell}</div>
              ))
            ))}
          </div>
        </div>
      </div>
    );
  }

  // Standard table
  const isWide = table.wide;
  return (
    <div style={{ marginBottom:20 }}>
      <div style={{ fontWeight:700, fontSize:13, color:"#333", marginBottom:8 }}>{table.title}</div>
      <div style={{ background:"#fff", borderRadius:12, overflow:"hidden", boxShadow:"0 2px 12px #0000000d", overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", minWidth: isWide ? 500 : "auto" }}>
          <thead>
            <tr style={{ background:"#1a1a2e" }}>
              {table.headers.map((h,i) => (
                <th key={i} style={{ padding:"9px 12px", textAlign:"left", fontSize:11, fontWeight:700, color:"#f5e6c8", borderRight:i<table.headers.length-1?"1px solid rgba(255,255,255,0.15)":"none", whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {table.rows.map((row,ri) => (
              <tr key={ri} style={{ background: ri%2===0?"#faf7f0":"#f3ede3" }}>
                {row.map((cell,ci) => {
                  const isFirst = ci===0;
                  const val = typeof cell === "object" ? (cell.word || cell.ex || cell.zh || cell) : cell;
                  return (
                    <td key={ci} style={{ padding:"8px 12px", fontWeight: isFirst?700:typeof cell==="object"&&cell.word?600:400, color: isFirst?"#5c4033": typeof cell==="object"&&cell.word?"#1d3557":"#444", fontSize: typeof cell==="object"&&cell.word?15:13, borderRight:ci<row.length-1?"1px solid #e8e0d0":"none", verticalAlign:"top", lineHeight:1.5 }}>
                      {typeof cell === "object" ? (
                        <>
                          {cell.word && <span style={{ fontWeight:700, color:"#1a1a2e" }}>{cell.word}</span>}
                          {cell.ex && <span style={{ display:"block", fontSize:11, color:"#888", fontStyle:"italic", marginTop:1 }}>{cell.ex}</span>}
                          {!cell.word && cell.zh && <span>{cell.zh}</span>}
                        </>
                      ) : val}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Reference View ──
function ReferenceView({ unit, isMobile }) {
  const pad = isMobile ? "16px 14px" : "24px 32px";
  return (
    <div style={{ height:"100%", overflowY:"auto", padding:pad }}>
      {/* Header */}
      <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:10, flexWrap:"wrap" }}>
        <span style={{ fontSize:isMobile?28:36 }}>{unit.icon}</span>
        <div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ fontFamily:"'Playfair Display',serif", fontSize:isMobile?22:28, fontWeight:700, color:unit.color }}>{unit.title}</span>
            <LevelBadge level={unit.level} />
          </div>
          <div style={{ fontSize:12, color:"#999" }}>{unit.sub}</div>
        </div>

      {/* Intro */}

// ── Quiz View (Multiple Choice) ──
function QuizView({ unit, onDone, isMobile }) {
  const [questions] = useState(() => shuffle(unit.quiz));
  const [idx, setIdx] = useState(0);
  const [chosen, setChosen] = useState(null);
  const [score, setScore] = useState({ c:0, w:0 });
  const [showHint, setShowHint] = useState(false);

  if (idx >= questions.length) {
    const pct = Math.round(score.c / questions.length * 100);
    return (
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100%", gap:16, padding:"0 20px" }}>
        <div style={{ fontSize:isMobile?52:72 }}>{ pct>=80?"🏆":pct>=60?"👍":"📚" }</div>
        <div style={{ fontFamily:"'Playfair Display',serif", fontSize:isMobile?26:32, color:"#1a1a2e" }}>练习完成！</div>
        <div style={{ fontSize:15, color:"#666" }}>✓ {score.c} 正确 · ✗ {score.w} 错误</div>
        <div style={{ background:"#fff", borderRadius:12, padding:"12px 28px", fontSize:15, fontWeight:700, color: pct>=80?"#2d6a4f":"#7a3b1e" }}>{pct}% 正确率</div>
        <div style={{ fontSize:13, color:"#888", textAlign:"center", maxWidth:360 }}>
          { pct>=80 ? "非常棒！继续保持 🎉" : pct>=60 ? "不错，再多练几次就能记住了！" : "多看看参考表，再来一次吧！"}
        </div>
        <div style={{ display:"flex", gap:12, marginTop:8, flexWrap:"wrap", justifyContent:"center" }}>
          <button onClick={onDone} style={{ background:"#888", color:"#fff", border:"none", borderRadius:12, padding:"10px 24px", fontSize:14 }}>返回</button>
          <button onClick={() => { setIdx(0); setChosen(null); setScore({c:0,w:0}); setShowHint(false); }} style={{ background:"#1a1a2e", color:"#fff", border:"none", borderRadius:12, padding:"10px 24px", fontSize:14 }}>再练一次</button>
        </div>
      </div>
    );
  }

  const q = questions[idx];
  const isCorrect = chosen === q.a;

  const next = () => { setIdx(i=>i+1); setChosen(null); setShowHint(false); };

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100%", gap:isMobile?14:20, padding: isMobile?"0 14px":"0 40px" }}>
      {/* Progress */}
      <div style={{ width:"100%", maxWidth:600 }}>
        <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#888", marginBottom:6 }}>
          <span>{idx+1} / {questions.length}</span>
          <span><span style={{ color:"#2d6a4f" }}>✓{score.c}</span> &nbsp; <span style={{ color:"#8b1a1a" }}>✗{score.w}</span></span>
        </div>
        <div style={{ height:4, background:"#ddd", borderRadius:4 }}>
          <div style={{ height:"100%", width:`${idx/questions.length*100}%`, background:unit.color, borderRadius:4, transition:"width 0.4s" }} />
        </div>
      </div>

      {/* Question card */}
      <div style={{ width:"100%", maxWidth:600, background:`linear-gradient(135deg, ${unit.color}, ${unit.color}bb)`, color:"#fff", borderRadius:20, padding: isMobile?"22px 18px":"32px 40px", textAlign:"center", boxShadow:`0 16px 48px ${unit.color}44` }}>
        <div style={{ fontSize:10, opacity:.55, letterSpacing:2, marginBottom:10, textTransform:"uppercase" }}>选择正确答案</div>
        <div style={{ fontSize: isMobile?18:22, fontWeight:700, lineHeight:1.5 }}>{q.q}</div>
      </div>

      {/* Options */}
      <div style={{ width:"100%", maxWidth:600, display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
        {q.opts.map((opt,i) => {
          let bg = "#fff", border = "2px solid #e0d8cc", color = "#333", fw = 400;
          if (chosen) {
            if (opt === q.a) { bg="#e8f5e9"; border="2px solid #2d6a4f"; color="#1a5c2e"; fw=700; }
            else if (opt === chosen) { bg="#fdecea"; border="2px solid #8b1a1a"; color="#5c1010"; }
          } else if (chosen === null) {
            // nothing
          }
          return (
            <button key={i} onClick={() => { if(!chosen){ setChosen(opt); setScore(s=>({...s,[opt===q.a?"c":"w"]:s[opt===q.a?"c":"w"]+1})); } }} style={{ background:bg, border, color, fontWeight:fw, borderRadius:14, padding: isMobile?"12px 10px":"14px 16px", fontSize:isMobile?14:16, textAlign:"center", transition:"all .15s", boxShadow:"0 2px 10px #0000000d" }}>
              {opt}
            </button>
          );
        })}
      </div>

      {/* Feedback & hint */}
      {chosen && (
        <div style={{ textAlign:"center" }}>
          {isCorrect
            ? <div style={{ color:"#2d6a4f", fontWeight:700, fontSize:16, marginBottom:8 }}>✓ 正确！</div>
            : <div style={{ marginBottom:8 }}>
                <div style={{ color:"#8b1a1a", fontWeight:700, fontSize:16 }}>✗ 正确答案：<em>{q.a}</em></div>
                <div style={{ fontSize:12, color:"#888", marginTop:4 }}>💡 {q.hint}</div>
              </div>
          }
          <button onClick={next} style={{ background:"#1a1a2e", color:"#fff", border:"none", borderRadius:12, padding:"11px 36px", fontSize:14 }}>下一题 →</button>
        </div>
      )}

      {!chosen && (
        <button onClick={()=>setShowHint(s=>!s)} style={{ background:"transparent", border:"1px solid #ccc", color:"#888", borderRadius:10, padding:"6px 16px", fontSize:12 }}>
          {showHint?"隐藏提示":"💡 提示"}
        </button>
      )}
      {showHint && !chosen && (
        <div style={{ background:"#fffbea", border:"1px solid #f0d060", borderRadius:10, padding:"9px 18px", fontSize:13, color:"#6b5a00", maxWidth:600, textAlign:"center" }}>💡 {q.hint}</div>
      )}
    </div>
  );
}

function VerbQuizView({ isMobile, onBack }) {
  const questions = React.useMemo(()=>{
    const all=[];
    const vEntries=Object.entries(VERBS);
    vEntries.forEach(([verb,data])=>{
      Object.keys(V_TENSE_ZH).forEach(tense=>{
        V_PRON.forEach((pron,i)=>{
          const correct=data[tense][i];
          const wrongs=[];
          const others=VERB_LIST.filter(k=>k!==verb);
          let attempts=0;
          while(wrongs.length<3&&attempts<50){
            attempts++;
            const rv=others[Math.floor(Math.random()*others.length)];
            const ri=Math.floor(Math.random()*V_PRON.length);
            const w=VERBS[rv][tense][ri];
            if(w&&w!==correct&&!wrongs.includes(w)) wrongs.push(w);
          }
          if(wrongs.length===3) all.push({q:`${verb} (${V_ZH[verb]}) — ${V_TENSE_ZH[tense]} — ${pron} (${V_PRON_ZH[i]})`,opts:shuffle([correct,...wrongs]),a:correct,hint:`${verb} ${V_TENSE_ZH[tense]} ${pron} = ${correct}`});
        });
      });
    });
    return shuffle(all).slice(0,20);
  },[]);
  const [idx,setIdx]=useState(0);
  const [chosen,setChosen]=useState(null);
  const [score,setScore]=useState({c:0,w:0});
  const next=()=>{setIdx(i=>i+1);setChosen(null);};
  if(idx>=questions.length){
    const pct=Math.round(score.c/questions.length*100);
    return (
      <div style={{ display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:16,padding:"0 20px" }}>
        <div style={{ fontSize:isMobile?52:72 }}>{pct>=80?"🏆":pct>=60?"👍":"📚"}</div>
        <div style={{ fontFamily:"'Playfair Display',serif",fontSize:isMobile?26:32,color:"#1a1a2e" }}>练习完成！</div>
        <div style={{ fontSize:15,color:"#666" }}>✓ {score.c} 正确 · ✗ {score.w} 错误 · {pct}%</div>
        <div style={{ display:"flex",gap:12,flexWrap:"wrap",justifyContent:"center" }}>
          <button onClick={onBack} style={{ background:"#888",color:"#fff",border:"none",borderRadius:12,padding:"10px 24px",fontSize:14 }}>返回</button>
          <button onClick={()=>{setIdx(0);setChosen(null);setScore({c:0,w:0});}} style={{ background:"#1a1a2e",color:"#fff",border:"none",borderRadius:12,padding:"10px 24px",fontSize:14 }}>再练一次</button>
        </div>
      </div>
    );
  }
  const q=questions[idx];
  return (
    <div style={{ display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",gap:isMobile?14:20,padding:isMobile?"0 14px":"0 40px" }}>
      <div style={{ width:"100%",maxWidth:600 }}>
        <div style={{ display:"flex",justifyContent:"space-between",fontSize:12,color:"#888",marginBottom:6 }}>
          <span>{idx+1} / {questions.length}</span>
          <span><span style={{ color:"#2d6a4f" }}>✓{score.c}</span> &nbsp; <span style={{ color:"#8b1a1a" }}>✗{score.w}</span></span>
        </div>
        <div style={{ height:4,background:"#ddd",borderRadius:4 }}><div style={{ height:"100%",width:`${idx/questions.length*100}%`,background:"#1d3557",borderRadius:4,transition:"width .4s" }}/></div>
      </div>
      <div style={{ width:"100%",maxWidth:600,background:"linear-gradient(135deg,#1d3557,#1d3557bb)",color:"#fff",borderRadius:20,padding:isMobile?"22px 18px":"32px 40px",textAlign:"center",boxShadow:"0 16px 48px #1d355744" }}>
        <div style={{ fontSize:10,opacity:.55,letterSpacing:2,marginBottom:10,textTransform:"uppercase" }}>选出正确的变位形式</div>
        <div style={{ fontSize:isMobile?15:19,fontWeight:700,lineHeight:1.6 }}>{q.q}</div>
      </div>
      <div style={{ width:"100%",maxWidth:600,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10 }}>
        {q.opts.map((opt,i)=>{
          let bg="#fff",border="2px solid #e0d8cc",color="#333",fw=400;
          if(chosen){if(opt===q.a){bg="#e8f5e9";border="2px solid #2d6a4f";color="#1a5c2e";fw=700;}else if(opt===chosen){bg="#fdecea";border="2px solid #8b1a1a";color="#5c1010";}}
          return (<button key={i} onClick={()=>{if(!chosen){setChosen(opt);setScore(s=>({...s,[opt===q.a?"c":"w"]:s[opt===q.a?"c":"w"]+1}));}}} style={{ background:bg,border,color,fontWeight:fw,borderRadius:14,padding:isMobile?"12px 10px":"14px 16px",fontSize:isMobile?14:16,textAlign:"center",transition:"all .15s",boxShadow:"0 2px 10px #0000000d" }}>{opt}</button>);
        })}
      </div>
      {chosen && (
        <div style={{ textAlign:"center" }}>
          {chosen===q.a?<div style={{ color:"#2d6a4f",fontWeight:700,fontSize:16,marginBottom:8 }}>✓ 正确！</div>:<div style={{ marginBottom:8 }}><div style={{ color:"#8b1a1a",fontWeight:700,fontSize:16 }}>✗ 正确答案：<em>{q.a}</em></div><div style={{ fontSize:12,color:"#888",marginTop:4 }}>💡 {q.hint}</div></div>}
          <button onClick={next} style={{ background:"#1a1a2e",color:"#fff",border:"none",borderRadius:12,padding:"11px 36px",fontSize:14 }}>下一题 →</button>
        </div>
      )}
    </div>
  );
}

          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:14, color:"#f5e6c8", fontWeight:700, lineHeight:1.4 }}>葡语语法全览</div>
          <div style={{ fontSize:10, color:"#f5e6c855", marginTop:2 }}>Gramática Portuguesa A1–B1</div>
        </div>
        {isMobile && <button onClick={()=>setSidebarOpen(false)} style={{ background:"transparent", border:"none", color:"#f5e6c870", fontSize:20, lineHeight:1 }}>✕</button>}
      </div>

      <div style={{ padding:"8px 8px", display:"flex", flexDirection:"column", gap:2 }}>
        <button onClick={()=>navTo("home")} style={{ display:"flex", alignItems:"center", gap:8, padding:"9px 10px", borderRadius:10, border:"none", background:page==="home"?"#f5e6c815":"transparent", color:page==="home"?"#f5e6c8":"#f5e6c870", fontSize:12, fontWeight:page==="home"?700:400, borderLeft:page==="home"?"3px solid #c8a96e":"3px solid transparent", textAlign:"left" }}>
          <span>⊞</span><span>主页</span>
        </button>
      </div>

      <div style={{ padding:"0 10px" }}>
        {["A1","A2"].map(level => (
          <div key={level}>
            <div style={{ fontSize:9, color:"#f5e6c840", letterSpacing:2, textTransform:"uppercase", margin:"10px 4px 5px", display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ background:LEVEL_COLOR[level], borderRadius:3, padding:"1px 5px", color:"#fff", fontSize:8 }}>{level}</span>
              <span>初级</span>
            </div>
            {UNITS.filter(u=>u.level===level).map(u => {
              const active = page.startsWith(u.id);
              return (
                <div key={u.id} style={{ marginBottom:3 }}>
                  <button onClick={()=>navTo(u.id+"_ref")} style={{ display:"flex", alignItems:"center", gap:7, width:"100%", padding:"8px 10px", borderRadius:9, border:"none", background:active?"#f5e6c818":"transparent", color:active?"#f5e6c8":"#f5e6c870", fontSize:12, fontWeight:active?700:400, borderLeft:active?"3px solid #c8a96e":"3px solid transparent", textAlign:"left" }}>
                    <span style={{ fontSize:14 }}>{u.icon}</span>
                    <span style={{ flex:1 }}>{u.title}</span>
                  </button>
                  {active && (
                    <div style={{ display:"flex", gap:4, paddingLeft:28, marginTop:3 }}>
                      {[["_ref","📖参考"],["_quiz","✏️练习"]].map(([suffix,label])=>(
                        <button key={suffix} onClick={()=>navTo(u.id+suffix)} style={{ flex:1, padding:"4px 6px", borderRadius:7, border:"none", background:page===u.id+suffix?"#c8a96e":"#f5e6c812", color:page===u.id+suffix?"#1a1a2e":"#f5e6c870", fontSize:10, fontWeight:700 }}>{label}</button>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Verb tool section */}
      <div style={{ padding:"0 10px" }}>
        <div style={{ fontSize:9,color:"#f5e6c840",letterSpacing:2,textTransform:"uppercase",margin:"10px 4px 5px",display:"flex",alignItems:"center",gap:6 }}>
          <span style={{ background:"#1d3557",borderRadius:3,padding:"1px 5px",color:"#fff",fontSize:8 }}>工具</span>
          <span>动词练习</span>
        </div>
        <div style={{ marginBottom:3 }}>
          <button onClick={()=>navTo("verb_table")} style={{ display:"flex",alignItems:"center",gap:7,width:"100%",padding:"8px 10px",borderRadius:9,border:"none",background:isVerbPage?"#f5e6c818":"transparent",color:isVerbPage?"#f5e6c8":"#f5e6c870",fontSize:12,fontWeight:isVerbPage?700:400,borderLeft:isVerbPage?"3px solid #c8a96e":"3px solid transparent",textAlign:"left" }}>
            <span style={{ fontSize:14 }}>🔤</span>
            <span style={{ flex:1 }}>动词变位表</span>
          </button>
          {isVerbPage && (
            <div style={{ display:"flex",gap:4,paddingLeft:28,marginTop:3 }}>
              {[["verb_table","📋查表"],["verb_flash","🃏闪卡"],["verb_quiz","✏️练习"]].map(([p,label])=>(
                <button key={p} onClick={()=>navTo(p)} style={{ flex:1,padding:"4px 5px",borderRadius:7,border:"none",background:page===p?"#c8a96e":"#f5e6c812",color:page===p?"#1a1a2e":"#f5e6c870",fontSize:10,fontWeight:700 }}>{label}</button>
              ))}
            </div>
          )}
        </div>
      </div>

      <div style={{ flex:1 }} />
      <div style={{ padding:"10px 12px", borderTop:"1px solid #2d2d5044", fontSize:9, color:"#f5e6c830", lineHeight:1.6 }}>
        {UNITS.length} 个语法单元 · {UNITS.reduce((s,u)=>s+u.quiz.length,0)} 道练习题 · 22 个动词
      </div>
    </div>
  );

  // ── Home ──
  const HomeView = () => (
    <div style={{ height:"100%", overflowY:"auto", padding: isMobile?"16px 14px": isTablet?"24px 24px":"32px 40px" }}>
      <div style={{ fontFamily:"'Playfair Display',serif", fontSize:isMobile?22:30, color:"#1a1a2e", marginBottom:4 }}>葡语语法全览 👋</div>
      <div style={{ fontSize:13, color:"#888", marginBottom:8 }}>Gramática Portuguesa · A1–A2 完整学习</div>
      <div style={{ background:"#fff", borderRadius:12, padding:"12px 18px", fontSize:13, color:"#555", lineHeight:1.8, marginBottom:28, maxWidth:640, boxShadow:"0 2px 10px #0000000a" }}>
        📌 建议学习路径：<strong>名词与冠词 → Ser/Estar → 动词现在时 → 形容词 → 代词 → 进行时 → 反身动词 → 动词搭配 → 连词 → 过去时 → …</strong><br/>
        每个单元先看「参考表」，再做「多选练习」，遇到不懂回头查表。
      </div>

      <div style={{ display:"grid", gridTemplateColumns: isMobile?"1fr":isTablet?"1fr 1fr":"repeat(3,1fr)", gap:14, marginBottom:28 }}>
        {UNITS.map(u => (
          <button key={u.id} className="card-h" onClick={()=>navTo(u.id+"_ref")} style={{ background:`linear-gradient(135deg,${u.color},${u.color}cc)`, color:"#fff", border:"none", borderRadius:16, padding: isMobile?"16px 14px":"22px 18px", textAlign:"left", cursor:"pointer", boxShadow:`0 6px 20px ${u.color}33` }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
              <span style={{ fontSize:isMobile?22:26 }}>{u.icon}</span>
              <LevelBadge level={u.level} small />
            </div>
            <div style={{ fontSize:isMobile?14:16, fontWeight:700, marginBottom:3 }}>{u.title}</div>
            <div style={{ fontSize:11, opacity:.7, marginBottom:6 }}>{u.sub}</div>
            <div style={{ fontSize:11, opacity:.6, lineHeight:1.5 }}>{u.quiz.length} 道练习题</div>
          </button>
        ))}
      </div>

      {/* Verb tool shortcut */}
      <div style={{ background:"linear-gradient(135deg,#1d3557,#2d4a7a)", borderRadius:14, padding:"16px 20px", marginBottom:20, maxWidth:740, display:"flex", alignItems:"center", gap:16, flexWrap:"wrap", boxShadow:"0 4px 20px #1d355733" }}>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:15, fontWeight:700, color:"#fff", marginBottom:3 }}>🔤 动词变位表 <span style={{ fontSize:11, background:"#f5e6c820", borderRadius:6, padding:"2px 8px", marginLeft:6 }}>工具</span></div>
          <div style={{ fontSize:12, color:"rgba(255,255,255,.6)" }}>22 个常用动词 · 4 种时态 · 命令式 · 闪卡练习</div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          {[["📋查表","verb_table"],["🃏闪卡","verb_flash"],["✏️练习","verb_quiz"]].map(([label,p])=>(
            <button key={p} onClick={()=>navTo(p)} style={{ background:"rgba(255,255,255,.12)", border:"1px solid rgba(255,255,255,.2)", borderRadius:10, padding:"7px 14px", color:"#fff", fontSize:12, fontWeight:700 }}>{label}</button>
          ))}
        </div>
      </div>

      {/* Quick tips */}
      <div style={{ background:"#fff", borderRadius:14, padding:"18px 20px", boxShadow:"0 2px 16px #0000000d", maxWidth:740, marginBottom:20 }}>
        <div style={{ fontSize:13, fontWeight:700, color:"#5c4033", marginBottom:12 }}>🔑 中文母语者最难的 5 个点</div>
        {[
          ["1", "ser vs estar", "两个「是」——身份用ser，状态用estar。中文只有一个，葡语必须选！"],
          ["2", "名词性别", "每个名词都有阴/阳性，形容词和冠词都要跟着变。词尾 -o/-a 是最常见规律。"],
          ["3", "动词变位", "每个人称都不同！先背 eu/tu/ele/nós/vocês 五个人称的变位。"],
          ["4", "介词缩合", "de+o=do，em+a=na，a+o=ao…… 这些缩合必须自动反应！"],
          ["5", "este/esse/aquele", "三档距离：近我/近你/远两者。中文只有这/那两档。"],
        ].map(([n,title,desc])=>(
          <div key={n} style={{ display:"flex", gap:10, padding:"8px 0", borderBottom:"1px solid #f0ebe0" }}>
            <span style={{ width:22, height:22, borderRadius:"50%", background:"#1a1a2e", color:"#f5e6c8", fontSize:11, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:1 }}>{n}</span>
            <div>
              <span style={{ fontWeight:700, fontSize:13, color:"#1a1a2e" }}>{title}</span>
              <span style={{ fontSize:12, color:"#777", marginLeft:8 }}>{desc}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:isMobile?"column":"row", height:"100dvh", overflow:"hidden" }}>
      {/* Mobile topbar */}
      {isMobile && (
        <div style={{ display:"flex", alignItems:"center", padding:"0 14px", height:50, background:"#1a1a2e", borderBottom:"1px solid #2d2d50", flexShrink:0 }}>
          <button onClick={()=>setSidebarOpen(true)} style={{ background:"transparent", border:"none", color:"#f5e6c8", fontSize:22, marginRight:10 }}>☰</button>
          <div style={{ fontFamily:"'Playfair Display',serif", color:"#f5e6c8", fontSize:16, fontWeight:700 }}>
            {page==="home" ? "葡语语法全览" : isVerbPage ? "动词变位表" : currentUnit?.title || ""}
          </div>
          {currentUnit && (
            <div style={{ marginLeft:"auto", display:"flex", gap:6 }}>
              {[["_ref","📖"],["_quiz","✏️"]].map(([suffix,label])=>(
                <button key={suffix} onClick={()=>navTo(currentUnitId+suffix)} style={{ background:page===currentUnitId+suffix?"#c8a96e":"transparent", border:"1px solid #f5e6c830", borderRadius:8, padding:"4px 8px", color:"#f5e6c8", fontSize:11 }}>{label}</button>
              ))}
            </div>
          )}
          {isVerbPage && (
            <div style={{ marginLeft:"auto", display:"flex", gap:6 }}>
              {[["verb_table","📋"],["verb_flash","🃏"],["verb_quiz","✏️"]].map(([p,label])=>(
                <button key={p} onClick={()=>navTo(p)} style={{ background:page===p?"#c8a96e":"transparent", border:"1px solid #f5e6c830", borderRadius:8, padding:"4px 8px", color:"#f5e6c8", fontSize:11 }}>{label}</button>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Sidebar overlay */}
      {isMobile && sidebarOpen && (
        <div onClick={()=>setSidebarOpen(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:200 }} />
      )}

      {/* Sidebar */}
      <div className="sidebar-drawer" style={{ ...(isMobile?{position:"fixed",top:0,left:0,height:"100%",zIndex:300,transform:sidebarOpen?"translateX(0)":"translateX(-100%)"}:{flexShrink:0,height:"100%"}), width:SIDEBAR_W }}>
        <Sidebar />
      </div>

      {/* Main content */}
      <div style={{ flex:1, overflow:"hidden", background:"#f5f0e8" }}>
        {page==="home" && <HomeView />}
        {currentUnit && isRef && <ReferenceView unit={currentUnit} isMobile={isMobile} />}
        {currentUnit && isQuiz && <QuizView unit={currentUnit} onDone={()=>navTo(currentUnitId+"_ref")} isMobile={isMobile} />}
        {page==="verb_table" && <VerbTableView isMobile={isMobile} />}
        {page==="verb_flash" && <VerbFlashView isMobile={isMobile} onBack={()=>navTo("verb_table")} />}
        {page==="verb_quiz" && <VerbQuizView isMobile={isMobile} onBack={()=>navTo("verb_table")} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>葡语学习 · Portuguese Learning</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#1d3557 0%,#457b9d 100%);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .container{max-width:600px;width:100%;text-align:center}
  .flag{font-size:56px;margin-bottom:12px}
  h1{color:#fff;font-size:28px;font-weight:700;margin-bottom:6px}
  .sub{color:rgba(255,255,255,.7);font-size:14px;margin-bottom:40px}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:480px){.cards{grid-template-columns:1fr}}
  .card{
    background:rgba(255,255,255,.95);
    border-radius:16px;
    padding:28px 20px;
    text-decoration:none;
    color:#1d3557;
    transition:transform .2s,box-shadow .2s;
    display:block;
  }
  .card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.2)}
  .card-icon{font-size:40px;margin-bottom:12px}
  .card-title{font-size:18px;font-weight:700;margin-bottom:6px}
  .card-title-pt{font-size:13px;color:#457b9d;margin-bottom:10px}
  .card-desc{font-size:13px;color:#555;line-height:1.6}
  .badge{
    display:inline-block;
    background:#e8f4f8;
    color:#457b9d;
    font-size:11px;
    font-weight:600;
    padding:3px 8px;
    border-radius:20px;
    margin-top:10px;
  }
  .footer{color:rgba(255,255,255,.5);font-size:12px;margin-top:32px}
</style>
</head>
<body>
<div class="container">
  <div class="flag">🇵🇹</div>
  <h1>葡语学习中心</h1>
  <p class="sub">Centro de Aprendizagem de Português</p>
  <div class="cards">
    <a href="grammar.html" class="card">
      <div class="card-icon">📚</div>
      <div class="card-title">语法全览</div>
      <div class="card-title-pt">Gramática Completa</div>
      <div class="card-desc">10个语法单元，从名词冠词到动词时态，系统学习A1–A2葡语语法</div>
      <span class="badge">A1–A2 · 10单元</span>
    </a>
    <a href="verbs.html" class="card">
      <div class="card-icon">🔤</div>
      <div class="card-title">动词变位</div>
      <div class="card-title-pt">Conjugação Verbal</div>
      <div class="card-desc">交互式动词变位表，支持闪卡练习和拼写测验</div>
      <span class="badge">常用动词 · 6时态</span>
    </a>
  </div>
  <p class="footer">为中文母语学习者设计 · Projetado para falantes de chinês</p>
</div>
</body>
</html>

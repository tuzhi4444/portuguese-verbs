<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>葡语学习 · Portuguese Learning</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#1d3557 0%,#457b9d 100%);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  .container{max-width:520px;width:100%;text-align:center}
  .flag{font-size:60px;margin-bottom:14px}
  h1{color:#fff;font-size:30px;font-weight:700;margin-bottom:6px;letter-spacing:-.5px}
  .sub{color:rgba(255,255,255,.65);font-size:14px;margin-bottom:36px}
  .main-card{
    background:rgba(255,255,255,.97);
    border-radius:20px;
    padding:32px 28px;
    text-decoration:none;
    color:#1d3557;
    display:block;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
    transition:transform .2s;
  }
  .main-card:hover{transform:translateY(-4px)}
  .card-icon{font-size:48px;margin-bottom:14px}
  .card-title{font-size:22px;font-weight:700;margin-bottom:4px}
  .card-title-pt{font-size:13px;color:#457b9d;margin-bottom:12px}
  .card-desc{font-size:13px;color:#555;line-height:1.7;margin-bottom:16px}
  .tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .tag{background:#e8f4f8;color:#457b9d;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px}
  .footer{color:rgba(255,255,255,.45);font-size:12px;margin-top:28px;line-height:1.8}
</style>
</head>
<body>
<div class="container">
  <div class="flag">🇵🇹</div>
  <h1>葡语学习中心</h1>
  <p class="sub">Centro de Aprendizagem de Português</p>

  <a href="grammar.html" class="main-card">
    <div class="card-icon">📚</div>
    <div class="card-title">葡语语法全览</div>
    <div class="card-title-pt">Gramática Completa · A1–A2</div>
    <div class="card-desc">
      10 个语法单元 + 动词变位工具，适合中文母语零基础学习者。<br>
      涵盖名词冠词、动词时态、代词、介词、疑问句、数词等全部核心语法。
    </div>
    <div class="tags">
      <span class="tag">📖 语法参考</span>
      <span class="tag">✏️ 多选练习</span>
      <span class="tag">🔤 动词变位</span>
      <span class="tag">🃏 闪卡</span>
    </div>
  </a>

  <p class="footer">
    为中文母语学习者设计 · Projetado para falantes de chinês<br>
    手机 / 平板 / 电脑 均可使用
  </p>
</div>
